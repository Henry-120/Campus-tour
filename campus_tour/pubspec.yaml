flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/campus_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/campus_icon.png"
  remove_alpha_ios: true

name: campus_tour
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  geolocator: ^14.0.2
  flutter_compass: ^0.8.0
  image_picker: ^1.2.1
  audioplayers: ^6.1.0
  get: ^4.6.6
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.8
  google_maps_flutter: ^2.16.0

  # 🔥 Firebase 套件 (版本對齊)
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_storage: ^13.2.0
  cloud_firestore: ^6.2.0
  google_sign_in: ^6.0.0
  nfc_manager: ^3.3.0
  video_player: ^2.11.1
  camera: ^0.12.0+1
  screenshot: ^3.0.0
  path_provider: ^2.1.5
  arkit_plugin: ^1.0.6
  vector_math: ^2.1.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  vibration: ^2.0.1 
  gal: ^2.1.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/fairy_img/
    - assets/images/component/
    - assets/images/NCU/
    - assets/audio/
    - assets/mapStyles/
    - assets/json/
    - assets/images/weather/
    - assets/images/fairy_video/
    - assets/images/nfc_position_photos/
    - assets/images/novice_leading/
    - assets/models/
    - assets/images/img_frame/

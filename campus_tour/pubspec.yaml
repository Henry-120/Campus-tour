name: campus_tour
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  geolocator: ^14.0.2
  flutter_compass: ^0.8.0
  image_picker: ^1.2.1
  audioplayers: ^6.1.0
  get: ^4.6.6
